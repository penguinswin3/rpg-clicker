<aside class="minigame-panel" [class.collapsed]="collapsed" *ngIf="shown">

  <!-- Header -->
  <div class="panel-header" (click)="toggleCollapsed()">
    <span class="panel-title" *ngIf="!collapsed">[ {{ activeMinigame.title | uppercase }} ]</span>
    <span class="panel-toggle">{{ collapsed ? '[&gt;]' : '[&lt;]' }}</span>
  </div>

  <!-- ── Collapsed view ─────────────────── -->
  <div class="collapsed-label" *ngIf="collapsed">
    <span class="collapsed-text">{{ activeCharacterId === 'merchant' ? 'B L A C K   M A R K E T' : 'S I D E Q U E S T' }}</span>
  </div>

  <div class="panel-body" *ngIf="!collapsed">

    <!-- ── Fighter: live combat minigame ── -->
    <ng-container *ngIf="activeCharacterId === 'fighter'">
      <app-fighter-minigame
        [attackPower]="fighterAttack"
        [potionChuggingLevel]="potionChuggingLevel"
        [strongerKoboldsLevel]="strongerKoboldsLevel"
        [firstStrikeLevel]="firstStrikeLevel"
        [firstStrikeEnabled]="firstStrikeEnabled"
        (firstStrikeEnabledChange)="firstStrikeEnabledChange.emit($event)"
        [slowBladeLevel]="slowBladeLevel"
        [gildedBladeLevel]="gildedBladeLevel"
        [mindReadingLevel]="mindReadingLevel"
        [catSwiftnessLevel]="catSwiftnessLevel"
        [koboldBaitLevel]="koboldBaitLevel"
        [koboldBaitEnabled]="koboldBaitEnabled"
        (koboldBaitEnabledChange)="koboldBaitEnabledChange.emit($event)"
        [shortRestLevel]="shortRestLevel"
        [shortRestEnabled]="shortRestEnabled"
        (shortRestEnabledChange)="shortRestEnabledChange.emit($event)"
        [selectedKoboldLevel]="selectedKoboldLevel"
        (selectedKoboldLevelChange)="selectedKoboldLevelChange.emit($event)"
        [savedState]="fighterCombatState"
        (stateChange)="fighterCombatStateChange.emit($event)"
        [autoSolveUnlocked]="!!autoSolveUnlocked['fighter']"
        [autoSolveEnabled]="!!autoSolveEnabled['fighter']"
        [autoSolveGoodMode]="!!autoSolveGoodMode['fighter']"
        (autoSolveEnabledChange)="onAutoSolveToggle('fighter', $event)"
        (goldBeadFound)="goldBeadFound.emit('fighter')"
        [gold2Progress]="gold2Progress['fighter']"
        (gold2ProgressChange)="onGold2Progress('fighter', $event)"
        (gold2BeadFound)="gold2BeadFound.emit('fighter')"
        [gemHunterLevel]="gemHunterLevel"
        [gold2BeadAlreadyFound]="!!gold2BeadFoundState['fighter']"
      />
    </ng-container>

    <!-- ── Apothecary: alchemy rhythm minigame ── -->
    <ng-container *ngIf="activeCharacterId === 'apothecary'">
      <app-apothecary-minigame
        [bubblingBrewUnlocked]="bubblingBrewLevel >= 1"
        [biggerBubblesLevel]="biggerBubblesLevel"
        [potionDilutionUnlocked]="potionDilutionLevel >= 1"
        [serialDilutionLevel]="serialDilutionLevel"
        [perfectPotionsLevel]="perfectPotionsLevel"
        [potionMarketingLevel]="potionMarketingLevel"
        [dilutionEnabled]="dilutionEnabled"
        (dilutionEnabledChange)="dilutionEnabledChange.emit($event)"
        [synapticalPotionsUnlocked]="synapticalPotionsLevel >= 1"
        [synapticStaticLevel]="synapticStaticLevel"
        [synapticalEnabled]="synapticalEnabled"
        (synapticalEnabledChange)="synapticalEnabledChange.emit($event)"
        [autoSolveUnlocked]="!!autoSolveUnlocked['apothecary']"
        [autoSolveEnabled]="!!autoSolveEnabled['apothecary']"
        [autoSolveGoodMode]="!!autoSolveGoodMode['apothecary']"
        (autoSolveEnabledChange)="onAutoSolveToggle('apothecary', $event)"
        (goldBeadFound)="goldBeadFound.emit('apothecary')"
        [gold2Progress]="gold2Progress['apothecary']"
        (gold2ProgressChange)="onGold2Progress('apothecary', $event)"
        (gold2BeadFound)="gold2BeadFound.emit('apothecary')"
        [gemHunterLevel]="gemHunterLevel"
        [gold2BeadAlreadyFound]="!!gold2BeadFoundState['apothecary']"
      />
    </ng-container>

    <!-- ── Ranger: scouting grid minigame ─── -->
    <ng-container *ngIf="activeCharacterId === 'ranger'">
      <app-ranger-minigame [bountifulLandsLevel]="bountifulLandsLevel" [abundantLandsLevel]="abundantLandsLevel" [fairyHostageLevel]="fairyHostageLevel" [treasureChestLevel]="treasureChestLevel" [xMarksTheSpotLevel]="xMarksTheSpotLevel"
        [autoSolveUnlocked]="!!autoSolveUnlocked['ranger']"
        [autoSolveEnabled]="!!autoSolveEnabled['ranger']"
        [autoSolveGoodMode]="!!autoSolveGoodMode['ranger']"
        (autoSolveEnabledChange)="onAutoSolveToggle('ranger', $event)"
        (goldBeadFound)="goldBeadFound.emit('ranger')"
        [gold2Progress]="gold2Progress['ranger']"
        (gold2ProgressChange)="onGold2Progress('ranger', $event)"
        (gold2BeadFound)="gold2BeadFound.emit('ranger')"
        [gemHunterLevel]="gemHunterLevel"
        [gold2BeadAlreadyFound]="!!gold2BeadFoundState['ranger']"
      />
    </ng-container>

    <!-- ── Culinarian: Mastermind recipe minigame ─── -->
    <ng-container *ngIf="activeCharacterId === 'culinarian'">
      <app-culinarian-minigame [wasteNotLevel]="wasteNotLevel" [largerCookbooksLevel]="largerCookbooksLevel" [cookbookAnnotationsLevel]="cookbookAnnotationsLevel"
        [ancientCookbookEnabled]="ancientCookbookEnabled"
        (ancientCookbookEnabledChange)="ancientCookbookEnabledChange.emit($event)"
        [autoSolveUnlocked]="!!autoSolveUnlocked['culinarian']"
        [autoSolveEnabled]="!!autoSolveEnabled['culinarian']"
        [autoSolveGoodMode]="!!autoSolveGoodMode['culinarian']"
        (autoSolveEnabledChange)="onAutoSolveToggle('culinarian', $event)"
        (goldBeadFound)="goldBeadFound.emit('culinarian')"
        [gold2Progress]="gold2Progress['culinarian']"
        (gold2ProgressChange)="onGold2Progress('culinarian', $event)"
        (gold2BeadFound)="gold2BeadFound.emit('culinarian')"
        [gemHunterLevel]="gemHunterLevel"
        [gold2BeadAlreadyFound]="!!gold2BeadFoundState['culinarian']"
      />
    </ng-container>

    <!-- ── Thief: Big Heist safe-cracking minigame ─── -->
    <ng-container *ngIf="activeCharacterId === 'thief'">
      <app-thief-minigame
        [vanishingPowderLevel]="vanishingPowderLevel"
        [potionCatEarsLevel]="potionCatEarsLevel"
        [bagOfHoldingLevel]="bagOfHoldingLevel"
        [relicHunterLevel]="relicHunterLevel"
        [lockedInLevel]="lockedInLevel"
        [flowStateLevel]="flowStateLevel"
        [autoSolveUnlocked]="!!autoSolveUnlocked['thief']"
        [autoSolveEnabled]="!!autoSolveEnabled['thief']"
        [autoSolveGoodMode]="!!autoSolveGoodMode['thief']"
        (autoSolveEnabledChange)="onAutoSolveToggle('thief', $event)"
        (goldBeadFound)="goldBeadFound.emit('thief')"
        [gold2Progress]="gold2Progress['thief']"
        (gold2ProgressChange)="onGold2Progress('thief', $event)"
        (gold2BeadFound)="gold2BeadFound.emit('thief')"
        [gemHunterLevel]="gemHunterLevel"
        [gold2BeadAlreadyFound]="!!gold2BeadFoundState['thief']"
      />
    </ng-container>

    <!-- ── Artisan: placeholder minigame ─── -->
    <ng-container *ngIf="activeCharacterId === 'artisan'">
      <app-artisan-minigame
        [luckyGemsLevel]="luckyGemsLevel"
        [doubleDipLevel]="doubleDipLevel"
        [standOutSelectionLevel]="standOutSelectionLevel"
        [goodEnoughLevel]="goodEnoughLevel"
        [closeEnoughLevel]="closeEnoughLevel"
        [autoSolveUnlocked]="!!autoSolveUnlocked['artisan']"
        [autoSolveEnabled]="!!autoSolveEnabled['artisan']"
        [autoSolveGoodMode]="!!autoSolveGoodMode['artisan']"
        (autoSolveEnabledChange)="onAutoSolveToggle('artisan', $event)"
        (goldBeadFound)="goldBeadFound.emit('artisan')"
        [gold2Progress]="gold2Progress['artisan']"
        (gold2ProgressChange)="onGold2Progress('artisan', $event)"
        (gold2BeadFound)="gold2BeadFound.emit('artisan')"
        [gemHunterLevel]="gemHunterLevel"
        [gold2BeadAlreadyFound]="!!gold2BeadFoundState['artisan']"
      />
    </ng-container>

    <!-- ── Necromancer: Well of Souls minigame ─── -->
    <ng-container *ngIf="activeCharacterId === 'necromancer'">
      <app-necromancer-minigame
        [autoSolveUnlocked]="!!autoSolveUnlocked['necromancer']"
        [autoSolveEnabled]="!!autoSolveEnabled['necromancer']"
        [autoSolveGoodMode]="!!autoSolveGoodMode['necromancer']"
        (autoSolveEnabledChange)="onAutoSolveToggle('necromancer', $event)"
        (goldBeadFound)="goldBeadFound.emit('necromancer')"
        [gold2Progress]="gold2Progress['necromancer']"
        (gold2ProgressChange)="onGold2Progress('necromancer', $event)"
        (gold2BeadFound)="gold2BeadFound.emit('necromancer')"
        [gemHunterLevel]="gemHunterLevel"
        [gold2BeadAlreadyFound]="!!gold2BeadFoundState['necromancer']"
      />
    </ng-container>

    <!-- ── Merchant: Black Market minigame ─── -->
    <ng-container *ngIf="activeCharacterId === 'merchant'">
      <app-merchant-minigame
        [autoSolveUnlocked]="!!autoSolveUnlocked['merchant']"
        [autoSolveEnabled]="!!autoSolveEnabled['merchant']"
        [autoSolveGoodMode]="!!autoSolveGoodMode['merchant']"
        (autoSolveEnabledChange)="onAutoSolveToggle('merchant', $event)"
        (goldBeadFound)="goldBeadFound.emit('merchant')"
        [gold2Progress]="gold2Progress['merchant']"
        (gold2ProgressChange)="onGold2Progress('merchant', $event)"
        (gold2BeadFound)="gold2BeadFound.emit('merchant')"
        [gemHunterLevel]="gemHunterLevel"
        [gold2BeadFoundState]="!!gold2BeadFoundState['merchant']"
        [savedAutoBuySelections]="merchantAutoBuySelections"
        (autoBuySelectionsChange)="merchantAutoBuySelectionsChange.emit($event)"
        (autoBuyerStateChange)="merchantAutoBuyerStateChange.emit($event)"
      />
    </ng-container>

    <!-- ── Artificer: Etching minigame ─── -->
    <ng-container *ngIf="activeCharacterId === 'artificer'">
      <app-artificer-minigame
        [extendedEtchingLevel]="extendedEtchingLevel"
        [selectedEtchingLevel]="selectedEtchingLevel"
        (selectedEtchingLevelChange)="selectedEtchingLevelChange.emit($event)"
        [autoSolveUnlocked]="!!autoSolveUnlocked['artificer']"
        [autoSolveEnabled]="!!autoSolveEnabled['artificer']"
        [autoSolveGoodMode]="!!autoSolveGoodMode['artificer']"
        (autoSolveEnabledChange)="onAutoSolveToggle('artificer', $event)"
        (goldBeadFound)="goldBeadFound.emit('artificer')"
        [gold2Progress]="gold2Progress['artificer']"
        (gold2ProgressChange)="onGold2Progress('artificer', $event)"
        (gold2BeadFound)="gold2BeadFound.emit('artificer')"
        [gemHunterLevel]="gemHunterLevel"
        [gold2BeadAlreadyFound]="!!gold2BeadFoundState['artificer']"
      />
    </ng-container>

    <!-- ── Chimeramancer: Chimeric Animation minigame ─── -->
    <ng-container *ngIf="activeCharacterId === 'chimeramancer'">
      <app-chimeramancer-minigame
        [slayerUnlocked]="slayerUnlocked"
        [savedContributions]="chimeramancerContributions"
        (contributionsChange)="chimeramancerContributionsChange.emit($event)"
        (chimeraCompleted)="chimeraCompleted.emit()"
        [autoSolveUnlocked]="!!autoSolveUnlocked['chimeramancer']"
        [autoSolveEnabled]="!!autoSolveEnabled['chimeramancer']"
        [autoSolveGoodMode]="!!autoSolveGoodMode['chimeramancer']"
        (autoSolveEnabledChange)="onAutoSolveToggle('chimeramancer', $event)"
        (goldBeadFound)="goldBeadFound.emit('chimeramancer')"
        [gold2Progress]="gold2Progress['chimeramancer']"
        (gold2ProgressChange)="onGold2Progress('chimeramancer', $event)"
        (gold2BeadFound)="gold2BeadFound.emit('chimeramancer')"
        [gemHunterLevel]="gemHunterLevel"
        [gold2BeadAlreadyFound]="!!gold2BeadFoundState['chimeramancer']"
        [quickStitchingLevel]="quickStitchingLevel"
        [minorTouchUpLevel]="minorTouchUpLevel"
      />
    </ng-container>

    <!-- ── Slayer: no sidequest ─── -->
    <ng-container *ngIf="activeCharacterId === 'slayer'">
      <div class="mg-divider">+----------+</div>
      <div class="mg-coming-soon">
        <span class="cs-label" style="color: #8b0000; text-align: center; display: block;">{{ slayerUnlocked ? MINIGAME_FLAVOR.SLAYER.desc : '...' }}</span>
      </div>
      <div class="mg-divider">+----------+</div>
    </ng-container>

    <!-- ── Other characters: placeholder ── -->
    <ng-container *ngIf="activeCharacterId !== 'fighter' && activeCharacterId !== 'apothecary' && activeCharacterId !== 'ranger' && activeCharacterId !== 'culinarian' && activeCharacterId !== 'thief' && activeCharacterId !== 'artisan' && activeCharacterId !== 'necromancer' && activeCharacterId !== 'merchant' && activeCharacterId !== 'artificer' && activeCharacterId !== 'chimeramancer' && activeCharacterId !== 'slayer'">

      <div class="mg-divider">+----------+</div>

      <div class="mg-coming-soon">
        <span class="cs-label">...</span>
      </div>

      <div class="mg-divider">+----------+</div>

    </ng-container>

  </div>

</aside>
