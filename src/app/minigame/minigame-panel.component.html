<aside class="minigame-panel" [class.collapsed]="collapsed" *ngIf="shown">

  <!-- Header -->
  <div class="panel-header" (click)="toggleCollapsed()">
    <span class="panel-title" *ngIf="!collapsed">[ {{ activeMinigame.title | uppercase }} ]</span>
    <span class="panel-toggle">{{ collapsed ? '[&gt;]' : '[&lt;]' }}</span>
  </div>

  <!-- ── Collapsed view ─────────────────── -->
  <div class="collapsed-label" *ngIf="collapsed">
    <span class="collapsed-text">S I D E Q U E S T</span>
  </div>

  <div class="panel-body" *ngIf="!collapsed">

    <!-- ── Fighter: live combat minigame ── -->
    <ng-container *ngIf="activeCharacterId === 'fighter'">
      <app-fighter-minigame
        [attackPower]="fighterAttack"
        [potionChuggingLevel]="potionChuggingLevel"
        [strongerKoboldsLevel]="strongerKoboldsLevel"
        [firstStrikeLevel]="firstStrikeLevel"
        [slowBladeLevel]="slowBladeLevel"
        [gildedBladeLevel]="gildedBladeLevel"
        [mindReadingLevel]="mindReadingLevel"
        [catSwiftnessLevel]="catSwiftnessLevel"
        [koboldBaitLevel]="koboldBaitLevel"
        [koboldBaitEnabled]="koboldBaitEnabled"
        (koboldBaitEnabledChange)="koboldBaitEnabledChange.emit($event)"
        [shortRestLevel]="shortRestLevel"
        [shortRestEnabled]="shortRestEnabled"
        (shortRestEnabledChange)="shortRestEnabledChange.emit($event)"
        [selectedKoboldLevel]="selectedKoboldLevel"
        (selectedKoboldLevelChange)="selectedKoboldLevelChange.emit($event)"
        [savedState]="fighterCombatState"
        (stateChange)="fighterCombatStateChange.emit($event)"
      />
    </ng-container>

    <!-- ── Apothecary: alchemy rhythm minigame ── -->
    <ng-container *ngIf="activeCharacterId === 'apothecary'">
      <app-apothecary-minigame
        [bubblingBrewUnlocked]="bubblingBrewLevel >= 1"
        [biggerBubblesLevel]="biggerBubblesLevel"
        [potionDilutionUnlocked]="potionDilutionLevel >= 1"
        [serialDilutionLevel]="serialDilutionLevel"
        [perfectPotionsLevel]="perfectPotionsLevel"
        [dilutionEnabled]="dilutionEnabled"
        (dilutionEnabledChange)="dilutionEnabledChange.emit($event)"
        [synapticalPotionsUnlocked]="synapticalPotionsLevel >= 1"
        [synapticStaticLevel]="synapticStaticLevel"
        [synapticalEnabled]="synapticalEnabled"
        (synapticalEnabledChange)="synapticalEnabledChange.emit($event)"
      />
    </ng-container>

    <!-- ── Ranger: scouting grid minigame ─── -->
    <ng-container *ngIf="activeCharacterId === 'ranger'">
      <app-ranger-minigame [bountifulLandsLevel]="bountifulLandsLevel" [abundantLandsLevel]="abundantLandsLevel" [fairyHostageLevel]="fairyHostageLevel" [treasureChestLevel]="treasureChestLevel" [xMarksTheSpotLevel]="xMarksTheSpotLevel" />
    </ng-container>

    <!-- ── Culinarian: Mastermind recipe minigame ─── -->
    <ng-container *ngIf="activeCharacterId === 'culinarian'">
      <app-culinarian-minigame [wasteNotLevel]="wasteNotLevel" [largerCookbooksLevel]="largerCookbooksLevel" [cookbookAnnotationsLevel]="cookbookAnnotationsLevel" />
    </ng-container>

    <!-- ── Thief: Big Heist safe-cracking minigame ─── -->
    <ng-container *ngIf="activeCharacterId === 'thief'">
      <app-thief-minigame
        [vanishingPowderLevel]="vanishingPowderLevel"
        [potionCatEarsLevel]="potionCatEarsLevel"
        [bagOfHoldingLevel]="bagOfHoldingLevel"
        [relicHunterLevel]="relicHunterLevel"
        [lockedInLevel]="lockedInLevel"
        [flowStateLevel]="flowStateLevel" />
    </ng-container>

    <!-- ── Artisan: placeholder minigame ─── -->
    <ng-container *ngIf="activeCharacterId === 'artisan'">
      <app-artisan-minigame
        [luckyGemsLevel]="luckyGemsLevel"
        [doubleDipLevel]="doubleDipLevel"
        [standOutSelectionLevel]="standOutSelectionLevel"
        [goodEnoughLevel]="goodEnoughLevel"
        [closeEnoughLevel]="closeEnoughLevel" />
    </ng-container>

    <!-- ── Necromancer: Well of Souls minigame ─── -->
    <ng-container *ngIf="activeCharacterId === 'necromancer'">
      <app-necromancer-minigame />
    </ng-container>

    <!-- ── Other characters: placeholder ── -->
    <ng-container *ngIf="activeCharacterId !== 'fighter' && activeCharacterId !== 'apothecary' && activeCharacterId !== 'ranger' && activeCharacterId !== 'culinarian' && activeCharacterId !== 'thief' && activeCharacterId !== 'artisan' && activeCharacterId !== 'necromancer'">

      <div class="mg-divider">+----------+</div>

      <div class="mg-coming-soon">
        <span class="cs-label">&gt;&gt; SIDEQUEST &lt;&lt;</span>
        <span class="cs-sub">[ Under Construction ]</span>
        <span class="cs-hint">// more content soon //</span>
      </div>

      <div class="mg-divider">+----------+</div>

    </ng-container>

  </div>

</aside>
