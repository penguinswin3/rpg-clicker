<div class="apoth-mg">

  <!-- ── Herb count ─────────────────────── -->
  <div class="resource-row">
    <span class="res-label">Herbs:</span>
    <span class="res-val" [class.res-low]="herbs < herbCost">{{ herbs }}</span>
  </div>

  <!-- ══════ ACTIVE BREWING ══════ -->
  <ng-container *ngIf="potionActive">

    <!-- Quality -->
    <div class="quality-block">
      <div class="q-label">Quality</div>
      <div class="q-ascii">{{ qualityBar }}</div>
      <div class="q-fraction">{{ quality }} / {{ maxQuality }}</div>
    </div>

    <!-- Beat bar -->
    <div class="beat-block">
      <div class="beat-label">BEAT BAR</div>
      <div class="beat-track">
        <!-- target zone -->
        <div class="beat-zone"
             [style.left.%]="zoneMin"
             [style.width.%]="zoneMax - zoneMin">
        </div>
        <!-- moving cursor -->
        <div class="beat-cursor" [style.left.%]="barPos"></div>
      </div>
      <!-- live zone indicator -->
      <div class="zone-status" [class.in-zone]="isInZone" [class.out-zone]="!isInZone">
        {{ isInZone ? '>>> IN ZONE <<<' : '--- OUT OF ZONE ---' }}
      </div>
    </div>

    <!-- Brew button — lights up when in zone -->
    <button class="action-btn brew-btn"
            [class.btn-hot]="isInZone"
            (click)="brew()">
      [ BREW ]
    </button>

  </ng-container>

  <!-- ══════ IDLE / START ══════ -->
  <ng-container *ngIf="!potionActive">
    <div class="idle-block">
      <button class="action-btn start-btn"
              [disabled]="!canStart"
              (click)="startPotion()">
        [ START POTION ]
      </button>
      <div class="cost-hint">costs {{ herbCost }} herbs</div>
      <div class="herb-warn" *ngIf="herbs < herbCost">
        need {{ herbCost - herbs }} more herbs
      </div>
    </div>
  </ng-container>

  <!-- ── Last message ─────────────────── -->
  <div class="brew-msg" *ngIf="lastMsg" [ngClass]="msgClass">
    {{ lastMsg }}
  </div>

</div>
