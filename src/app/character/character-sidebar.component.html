<aside class="char-sidebar" [class.collapsed]="collapsed">

  <!-- Toggle bar -->
  <div class="sidebar-header" (click)="toggle()">
    <span class="sidebar-toggle">{{ collapsed ? '[<]' : '[>]' }}</span>
    <span class="sidebar-title" *ngIf="!collapsed">[ CHARACTERS ]</span>
  </div>

  <!-- ══ Expanded ════════════════════════ -->
  <div class="sidebar-content" *ngIf="!collapsed">

    <!-- Hero Stats -->
    <div class="hero-stats-box">
      <div class="box-label">{{ heroStatsFlavor.BOX_TITLE }}</div>
      <div class="stat-row" *ngFor="let s of heroStats">
        <span class="stat-key">{{ s.label }}</span>
        <span class="stat-val">{{ s.value }}</span>
      </div>
    </div>

    <div class="rule">---[ PARTY ]---</div>

    <!-- Only unlocked characters -->
    <div
      class="char-card"
      *ngFor="let c of unlockedCharacters"
      [class.is-active]="c.id === activeId"
      (click)="setActive(c.id)">

      <div class="char-header">
        <span class="char-name" [style.color]="c.color">{{ c.name }}</span>
        <span class="badge-jacks" *ngIf="getJackCount(c.id) > 0">({{ getJackCount(c.id) }})</span>
      </div>

      <p class="char-desc">{{ c.description }}</p>


    </div>

  </div><!-- /sidebar-content -->

  <!-- ══ Collapsed ══════════════════════ -->
  <div class="collapsed-list" *ngIf="collapsed">
    <div
      class="compact-char"
      *ngFor="let c of unlockedCharacters"
      [class.is-active]="c.id === activeId"
      [class.is-inactive]="c.id !== activeId"
      [title]="c.name + (c.id === activeId ? ' (active)' : ' — click to switch')"
      (click)="setActive(c.id)">
      <span class="compact-initial" [style.color]="c.color">{{ c.name[0] }}</span>
      <span class="compact-pip">{{ c.id === activeId ? '*' : 'o' }}</span>
      <span class="compact-jacks" *ngIf="getJackCount(c.id) > 0">({{ getJackCount(c.id) }})</span>
    </div>
  </div>

</aside>
