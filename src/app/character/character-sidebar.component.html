<aside class="char-sidebar" [class.collapsed]="collapsed">

  <!-- Toggle bar -->
  <div class="sidebar-header" (click)="toggle()">
    <span class="sidebar-toggle">{{ collapsed ? '[<]' : '[>]' }}</span>
    <span class="sidebar-title" *ngIf="!collapsed">[ CHARACTERS ]</span>
  </div>

  <!-- ══ Expanded ════════════════════════ -->
  <div class="expanded-wrapper" *ngIf="!collapsed">

    <!-- Pinned: Hero Stats (never scrolls) -->
    <div class="hero-stats-pinned">
      <div class="hero-stats-box">
        <div class="box-label">{{ heroStatsFlavor.BOX_TITLE }}</div>
        <div class="stat-row" *ngFor="let s of heroStats">
          <span class="stat-key">{{ s.label }}</span>
          <span class="stat-val" [style.color]="s.color || null">{{ s.value }}</span>
        </div>
      </div>
    </div>

    <div class="sidebar-content">

      <div class="rule">---[ PARTY ]---</div>

      <!-- Only unlocked characters -->
      <div
        class="char-card"
        *ngFor="let c of unlockedCharacters"
        [class.is-active]="c.id === activeId"
        (click)="setActive(c.id)">

        <!-- State indicator overlays (visual only) -->
        <div class="state-fill thief-stun-fill" *ngIf="c.id === 'thief' && isThiefStunned" [ngStyle]="thiefStunAnimStyle"></div>
        <div class="state-fill artisan-timer-fill" *ngIf="c.id === 'artisan' && isArtisanTimerActive" [ngStyle]="artisanTimerAnimStyle"></div>
        <div class="necro-half necro-defile" *ngIf="c.id === 'necromancer'" [class.necro-active-half]="necromancerActiveButton === 'defile'"></div>
        <div class="necro-half necro-ward" *ngIf="c.id === 'necromancer'" [class.necro-active-half]="necromancerActiveButton === 'ward'"></div>

        <div class="char-header">
          <span class="char-name" [style.color]="c.color">{{ c.name }}</span>
          <span class="badge-jacks" *ngIf="getJackCount(c.id) > 0">({{ getJackCount(c.id) }})</span>
        </div>

        <p class="char-desc" *ngIf="!blandMode">{{ c.description }}</p>

      </div>

    </div><!-- /sidebar-content -->

    <!-- Unassign All Jacks — anchored to bottom of expanded sidebar -->
    <div class="sidebar-unassign-wrap" *ngIf="jacksOwned >= 5">
      <button class="sidebar-unassign-btn"
              [disabled]="totalJacksAssigned <= 0"
              (click)="emitUnassignAll()">
        [ Recall all Jacks ]
      </button>
    </div>

  </div><!-- /expanded-wrapper -->

  <!-- ══ Collapsed ══════════════════════ -->
  <div class="collapsed-list" *ngIf="collapsed">
    <div
      class="compact-char"
      *ngFor="let c of unlockedCharacters"
      [class.is-active]="c.id === activeId"
      [class.is-inactive]="c.id !== activeId"
      [class.compact-stunned]="c.id === 'thief' && isThiefStunned"
      [class.compact-timer]="c.id === 'artisan' && isArtisanTimerActive"
      [title]="c.name + (c.id === activeId ? ' (active)' : ' — click to switch')"
      (click)="setActive(c.id)">
      <!-- Necromancer half-shade overlays in collapsed view -->
      <div class="necro-half-compact necro-defile-compact" *ngIf="c.id === 'necromancer'" [class.necro-active-half]="necromancerActiveButton === 'defile'"></div>
      <div class="necro-half-compact necro-ward-compact" *ngIf="c.id === 'necromancer'" [class.necro-active-half]="necromancerActiveButton === 'ward'"></div>
      <span class="compact-initial" [style.color]="c.color">{{ c.name[0] }}</span>
      <span class="compact-pip">{{ c.id === activeId ? '*' : 'o' }}</span>
      <span class="compact-jacks" *ngIf="getJackCount(c.id) > 0">({{ getJackCount(c.id) }})</span>
    </div>
  </div>

</aside>
